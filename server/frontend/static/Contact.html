<!DOCTYPE html>
<html>
<head>
    <title>Contact Us</title>

    <!-- Bootstrap CSS -->
    <link
        rel="stylesheet"

    <style>
        body {
            background-color: #f4f6f9;
        }

        .contact-container {
            max-width: 700px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);

        h2 {
            color: #0d6efd;
            margin-bottom: 20px;
        }

        .contact-item {
            margin-bottom: 15px;

</head>

<body>

    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">

            <a class="navbar-brand" href="/">Car Dealership</a>

            <div class="navbar-nav">
                <a class="nav-link" href="/">Home</a>
                <a class="nav-link" href="/about/">About Us</a>
                <a class="nav-link active" aria-current="page" href="/contact/">
                    Contact Us
                </a>
            </div>

        </div>
    </nav>

    <!-- Contact Content -->
    <div class="contact-container">

        <h2>Contact Us</h2>

        <div class="contact-item">
            <strong>Company:</strong> AutoWorld Dealership
        </div>

        <div class="contact-item">
            <strong>Address:</strong>
            123 Tech Avenue, Bilaspur, Chhattisgarh, India
        </div>

        <div class="contact-item">
            <strong>Phone:</strong>
            +91 98765 43210
        </div>

        <div class="contact-item">
            <strong>Email:</strong>
            support@autoworld.com
        </div>

        <div class="contact-item">

            Monday - Saturday, 9:00 AM - 7:00 PM
        </div>

</html>
